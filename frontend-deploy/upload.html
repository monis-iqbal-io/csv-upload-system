
<!DOCTYPE html>
<html>
<head>
    <title>Upload CSV</title>
    <link rel="stylesheet" href="css/upload.css">
</head>

<body>

<div class="container">

    <h2>Upload CSV File</h2>

    <form id="uploadForm">

        <div class="file-input">

    
        <button type="button" onclick="openFilePicker()">Select CSV File</button>

        
        <input type="file" id="fileInput" accept=".csv" required hidden>

        
        <p id="fileName">No file selected</p>

</div>

        <br>

        <button type="submit">Upload</button>
    </form>

    <p id="error"></p>

</div>

<script>
const BASE_URL = "https://csv-upload-backend-lzun.onrender.com";
//OPEN FILE PICKER
function openFilePicker() {
    document.getElementById("fileInput").click();
}

//SHOW SELECTED FILE NAME
document.getElementById("fileInput").addEventListener("change", function() {
    const file = this.files[0];
    document.getElementById("fileName").innerText =
        file ? file.name : "No file selected";
});


//UPLOAD FORM
document.getElementById("uploadForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let file = document.getElementById("fileInput").files[0];

    if (!file) {
        document.getElementById("error").innerText = "Please select a file!";
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    fetch(`${BASE_URL}/upload-csv`, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            document.getElementById("error").innerText = data.error;
            return;
        }

        localStorage.setItem("file_name", data.file_name);
        localStorage.setItem("headers", JSON.stringify(data.headers));

        window.location.href = "mapping.html";
    })
    .catch(err => {
        document.getElementById("error").innerText = "Upload failed!";
    });
});

</script>

</body>
</html>
